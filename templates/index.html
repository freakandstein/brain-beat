<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BrainBeat</title>
<style>
:root {
    --bg:     #0f0f1a;
    --panel:  #1a1a2e;
    --card:   #16213e;
    --border: #2a2a4a;
    --text:   #e2e8f0;
    --dim:    #64748b;
    --accent: #1e293b;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    min-height: 100vh;
    display: flex;
    justify-content: center;
    padding: 12px 12px 24px;
}

.container {
    width: 100%;
    max-width: 620px;
}

/* ── Header ─────────────────────────────────────────── */
.header { padding: 4px 0 8px; }
.header h1 {
    font-size: 1.45rem;
    font-weight: 800;
    letter-spacing: 0.1em;
    color: var(--text);
}
.header-bottom {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-top: 4px;
}
.header-sub {
    display: flex;
    align-items: center;
    gap: 6px;
    color: var(--dim);
    font-size: 0.78rem;
}
.live-dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: #4b5563;
    flex-shrink: 0;
    transition: background 0.4s;
}
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.25} }

/* ── BCI connect button ──────────────────────────────── */
.bci-wrap {
    display: flex;
    flex-direction: column;
    align-items: flex-end;
    gap: 4px;
    flex-shrink: 0;
}
#bci-btn {
    font-family: 'Courier New', monospace;
    font-size: 0.68rem;
    font-weight: 700;
    letter-spacing: 0.06em;
    padding: 3px 8px;
    border-radius: 5px;
    border: 1px solid var(--border);
    background: var(--accent);
    color: var(--dim);
    cursor: pointer;
    transition: all 0.15s;
    white-space: nowrap;
}
#bci-btn:hover { border-color: var(--text); color: var(--text); }
#bci-btn.scanning { color: #fbbf24; border-color: #fbbf24; animation: blink 0.9s infinite; }
#bci-btn.connecting { color: #fbbf24; border-color: #fbbf24; cursor: default; }
#bci-btn.connected {
    color: #4ade80;
    border-color: #4ade80;
    background: #1a2e20;
    cursor: pointer;
}
#bci-btn.connected:hover { background: #243a2a; }
.bci-device-list {
    display: flex;
    flex-direction: column;
    align-items: flex-end;
    gap: 4px;
}

/* ── Divider ─────────────────────────────────────────── */
.divider { height: 1px; background: var(--border); margin: 6px 0; }

/* ── Main Card ──────────────────────────────────────── */
.main-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 14px 16px;
    margin: 6px 0 10px;
}

/* ── State row ──────────────────────────────────────── */
.state-row {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 10px;
    margin-bottom: 8px;
}
.state-row-right {
    display: flex;
    flex-direction: column;
    align-items: flex-end;
    flex-shrink: 0;
    position: relative;
}
.hr-badge {
    font-family: 'Courier New', monospace;
    font-size: 0.92rem;
    color: #fb7185;
}
#state-badge {
    font-family: 'Courier New', Courier, monospace;
    font-size: 2.2rem;
    font-weight: 900;
    letter-spacing: 0.2em;
    color: #4ade80;
    transition: color 0.5s, text-shadow 0.5s;
    text-shadow: 0 0 24px #4ade8080;
    min-width: 6.5ch;
    display: block;
}
#state-desc {
    color: var(--dim);
    font-size: 0.82rem;
}

/* ── Spectrum slider ─────────────────────────────────── */
.spectrum-wrap { margin-bottom: 10px; }
.spectrum-labels {
    display: flex;
    justify-content: space-between;
    margin-bottom: 5px;
}
.spectrum-label {
    font-family: 'Courier New', monospace;
    font-size: 0.62rem;
    letter-spacing: 0.1em;
}
.spectrum-label.calm  { color: #4ade80; }
.spectrum-label.flow  { color: #facc15; text-align: center; flex: 1; }
.spectrum-label.tense { color: #c084fc; }
.spectrum-track {
    position: relative;
    height: 10px;
    border-radius: 5px;
    background: linear-gradient(90deg, #4ade80 0%, #facc15 50%, #c084fc 100%);
    margin-bottom: 6px;
}
.spectrum-flow-zone {
    position: absolute;
    top: -3px;
    left: 35%;
    width: 30%;
    height: 16px;
    border: 1.5px solid #facc1580;
    border-radius: 4px;
    pointer-events: none;
}
.spectrum-cursor {
    position: absolute;
    top: 50%;
    transform: translate(-50%, -50%);
    width: 14px;
    height: 14px;
    border-radius: 50%;
    background: #fff;
    box-shadow: 0 0 8px #fff8, 0 0 0 2px #0008;
    transition: left 0.18s ease-out;
    pointer-events: none;
}
.spectrum-sublabels {
    display: flex;
    justify-content: space-between;
    font-family: 'Courier New', monospace;
    font-size: 0.58rem;
    color: var(--dim);
    padding: 0 2px;
}


/* ── Mental Command ─────────────────────────────────── */
.mental-inline {
    display: flex;
    align-items: center;
    gap: 5px;
    border-radius: 6px;
    padding: 2px 4px 2px 3px;
    transition: background 0.3s;
    position: absolute;
    top: calc(100% + 4px);
    right: 0;
    white-space: nowrap;
}
.mental-inline.flash {
    background: #4ade8010;
}
.mental-scene {
    font-family: 'Courier New', Courier, monospace;
    font-size: 0.82rem;
    font-weight: 400;
    color: #4ade80;
    white-space: nowrap;
}
.mental-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: #3f3f46;
    flex-shrink: 0;
    transition: background 0.2s, box-shadow 0.2s;
}
.mental-dot.active {
    background: #4ade80;
    box-shadow: 0 0 8px #4ade8080;
}

/* ── EEG + Map row ───────────────────────────────────── */
.eeg-map-row {
    display: flex;
    gap: 20px;
    align-items: flex-start;
}
.eeg-channels { flex: 1; min-width: 0; }

.section-label {
    font-family: 'Courier New', monospace;
    font-size: 0.6rem;
    letter-spacing: 0.15em;
    color: var(--dim);
    margin-bottom: 6px;
}

/* ── EEG Waveforms ───────────────────────────────────── */
.channel { margin-bottom: 8px; }
.channel:last-child { margin-bottom: 0; }
.channel-header {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    margin-bottom: 4px;
}
.channel-name {
    font-family: 'Courier New', Courier, monospace;
    font-size: 0.82rem;
    font-weight: 700;
}
.channel-name.alpha { color: #60a5fa; }
.channel-name.beta  { color: #a78bfa; }
.channel-name.theta { color: #34d399; }
.hz-label { font-size: 0.58rem; font-weight: 400; opacity: 0.55; margin-left: 5px; }
.waveform-canvas {
    width: 100%;
    height: 48px;
    display: block;
    border-radius: 6px;
}

/* ── EEG Channel Map ─────────────────────────────────── */
.map-col {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
    flex-shrink: 0;
}
.sq-label {
    font-family: 'Courier New', monospace;
    font-size: 0.6rem;
    letter-spacing: 0.12em;
    color: var(--dim);
}
.head-legend {
    display: flex;
    flex-direction: column;
    gap: 4px;
    font-size: 0.64rem;
    color: var(--dim);
}
.head-legend span { display: flex; align-items: center; gap: 5px; }
.head-legend i {
    display: inline-block;
    width: 8px; height: 8px;
    border-radius: 50%;
    flex-shrink: 0;
}

.bci-device-item {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 8px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 5px 10px;
    font-size: 0.72rem;
    cursor: pointer;
    transition: border-color 0.15s;
    white-space: nowrap;
}
.bci-device-item:hover { border-color: #4ade80; }
.bci-device-name { color: var(--text); font-weight: 600; font-family: 'Courier New', monospace; }
.bci-device-addr { color: var(--dim); font-family: monospace; font-size: 0.65rem; }
</style>
</head>

<body>
<div class="container">

  <!-- Header -->
  <div class="header">
    <h1>BRAINWAVE MONITOR</h1>
    <div class="header-bottom">
      <div class="header-sub">
        <span class="live-dot" id="live-dot"></span>
        FluidSynth &nbsp;·&nbsp; Generative &nbsp;·&nbsp; Realtime
      </div>
      <div class="bci-wrap">
        <button id="bci-btn" onclick="bciBtnClick()">&#x1F50D; Connect</button>
        <div class="bci-device-list" id="bci-device-list"></div>
      </div>
    </div>
  </div>

  <div class="divider"></div>

  <!-- Main Card: State + Spectrum + EEG + Map -->
  <div class="main-card">

    <!-- State -->
    <div class="state-row">
      <div>
        <div id="state-badge">CALM</div>

      </div>
      <div class="state-row-right">
        <div class="hr-badge">&#9829; <span id="hr-val">—</span></div>

        </div>
      </div>
    </div>

    <!-- Spectrum -->
    <div class="spectrum-wrap">
      <div class="spectrum-labels">
        <span class="spectrum-label calm">CALM</span>
        <span class="spectrum-label flow">⬡ FLOW ZONE</span>
        <span class="spectrum-label tense">TENSE</span>
      </div>
      <div class="spectrum-track">
        <div class="spectrum-flow-zone"></div>
        <div class="spectrum-cursor" id="spectrum-cursor" style="left:20%"></div>
      </div>

            <span class="channel-name theta">θ &nbsp;theta<span class="hz-label">4–8 Hz</span></span>

          </div>
          <canvas id="alpha-wave" class="waveform-canvas"></canvas>

        <div class="channel">
          <div class="channel-header">

      <!-- EEG Channel Map -->

          <circle cx="100" cy="112" r="82" fill="none" stroke="#2a2a4a" stroke-width="1.5"/>
          <path d="M93,31 L100,22 L107,31" fill="none" stroke="#2a2a4a" stroke-width="1.5" stroke-linejoin="round"/>
          <path d="M18,112 Q10,112 10,106 Q10,100 18,100" fill="none" stroke="#2a2a4a" stroke-width="1.2"/>
          <path d="M182,112 Q190,112 190,106 Q190,100 182,100" fill="none" stroke="#2a2a4a" stroke-width="1.2"/>
          <circle id="eq-AF7" cx="64" cy="56" r="10" fill="#3f3f46" stroke="#1a1a2e" stroke-width="1.5"/>
          <text x="64" y="60" text-anchor="middle" font-size="7.5" fill="#94a3b8" font-family="monospace">AF7</text>
          <circle id="eq-AF8" cx="136" cy="56" r="10" fill="#3f3f46" stroke="#1a1a2e" stroke-width="1.5"/>

          <text x="21" y="116" text-anchor="middle" font-size="7.5" fill="#94a3b8" font-family="monospace">TP9</text>
          <circle id="eq-TP10" cx="179" cy="112" r="10" fill="#3f3f46" stroke="#1a1a2e" stroke-width="1.5"/>

<script src="/static/socket.io.min.js"></script>
<script>
// ── Socket.IO ──────────────────────────────────────────────────────────────
const socket = io();

socket.on('connect', () => {
  const dot = document.getElementById('live-dot');
  dot.style.background = '#4ade80';
  dot.style.animation  = 'blink 1.8s ease-in-out infinite';
});

socket.on('disconnect', () => {
  const dot = document.getElementById('live-dot');
  dot.style.background = '#f87171';
  dot.style.animation  = 'none';
});

socket.on('state_update', (d) => {
  const sp = d.spectrum_pos ?? 0.2;

  let displayState, color, desc;
  if (sp > 0.65) {
    displayState = 'TENSE'; color = '#c084fc'; desc = 'Tense / Aroused';
  } else if (sp >= 0.35) {
    displayState = 'FLOW';  color = '#facc15'; desc = 'Flow State';
  } else {
    displayState = 'CALM';  color = '#4ade80'; desc = 'Calm / Relaxed';
  }
  const badge = document.getElementById('state-badge');
  badge.textContent = displayState;
  badge.style.color = color;
  badge.style.textShadow = `0 0 24px ${color}80`;
  document.getElementById('state-desc').textContent = desc;

  document.getElementById('spectrum-cursor').style.left = (sp * 100) + '%';
  document.getElementById('hr-val').textContent = d.heart_rate ? d.heart_rate + ' bpm' : '—';

  function toDb(v) { return 10 * Math.log10(Math.max(v, 1e-10)); }
  function fmtHz(hz) { return (hz != null) ? hz.toFixed(1) + ' Hz' : '—'; }
  if (d.theta_raw != null) { waves.theta.push(Math.max(toDb(d.theta_raw), 0)); document.getElementById('theta-val').textContent = fmtHz(d.theta_hz); }
  if (d.alpha_raw != null) { waves.alpha.push(Math.max(toDb(d.alpha_raw), 0)); document.getElementById('alpha-val').textContent = fmtHz(d.alpha_hz); }
  if (d.beta_raw  != null) { waves.beta.push(Math.max(toDb(d.beta_raw),  0)); document.getElementById('beta-val').textContent  = fmtHz(d.beta_hz);  }

  if (d.muse === 'connected' && !museConnected && !museDisconnecting) {
    setBciUI('connected');
  }

  updateHeadDiagram(d.channel_quality, d.muse === 'connected');
});

// ── EEG Head Diagram ──────────────────────────────────────────────────────
function updateHeadDiagram(quality, connected) {
  ['AF7', 'AF8', 'TP9', 'TP10'].forEach(name => {
    const el = document.getElementById('eq-' + name);
    if (!el) return;
    if (!connected || quality === null) { el.setAttribute('fill', '#3f3f46'); return; }
    const q = quality[name] ?? 0;
    el.setAttribute('fill', q >= 0.7 ? '#4ade80' : q >= 0.35 ? '#fbbf24' : '#f87171');
  });
}

// ── Muse 2 ────────────────────────────────────────────────────────────────
let museConnected     = false;
let museDisconnecting = false;
let _connectTimeout   = null;

function bciBtnClick() {
  if (museConnected) {
    museDisconnecting = true;
    socket.emit('muse_disconnect');
    setBciUI('disconnected');
  } else {
    setBciUI('scanning');
    document.getElementById('bci-device-list').innerHTML = '';
    socket.emit('muse_scan');
  }
}

function connectDevice(name, address) {
  socket.emit('muse_connect', { address: address });
  setBciUI('connecting', name);
  document.getElementById('bci-device-list').innerHTML = '';
  clearTimeout(_connectTimeout);
  _connectTimeout = setTimeout(() => {
    if (!museConnected) setBciUI('error');
  }, 45000);
}

function setBciUI(status, name) {
  const btn  = document.getElementById('bci-btn');
  const list = document.getElementById('bci-device-list');
  museConnected = (status === 'connected');
  btn.className = '';

  if (status === 'connected') {
    btn.className   = 'connected';
    btn.textContent = '● Connected';
  } else if (status === 'scanning') {
    btn.className   = 'scanning';
    btn.textContent = 'Scanning...';
  } else if (status === 'connecting') {
    btn.className   = 'connecting';
    btn.textContent = '⏳ ' + (name || 'Connecting...');
  } else if (status === 'reconnecting') {
    btn.className   = 'connecting';
    btn.textContent = '🔄 Reconnecting...';
  } else if (status === 'error') {
    btn.textContent = '⚠ Retry';
  } else {
    btn.textContent = '🔍 Connect';
    list.innerHTML  = '';
  }
}

socket.on('muse_scan_result', (d) => {
  if (d.scanning) return;
  const list = document.getElementById('bci-device-list');
  const btn  = document.getElementById('bci-btn');
  btn.className   = '';
  btn.textContent = '🔍 Connect';
  if (d.error) {
    list.innerHTML = `<div style="font-size:0.68rem;color:#f87171;text-align:right">${d.error}</div>`;
    return;
  }
  if (!d.devices || d.devices.length === 0) {
    list.innerHTML = '<div style="font-size:0.68rem;color:var(--dim);text-align:right">No devices found</div>';
    return;
  }
  list.innerHTML = d.devices.map(dev =>
    `<div class="bci-device-item" onclick="connectDevice('${dev.name}','${dev.address}')">
       <span class="bci-device-name">${dev.name}</span>
       <span class="bci-device-addr">${dev.address}</span>
     </div>`
  ).join('');
});

// ── Mental Commands ────────────────────────────────────────────────────────
const mentalScenes = {
  wink:         'Scene 1',
  jaw_clench:   'Scene 2',
  eyebrow_raise:'Scene 3',
};

let _mentalFlashTimer = null;

function triggerMental(event) {
  const scene = mentalScenes[event] || 'Scene ?';
  const card  = document.getElementById('mental-card');
  const dot   = document.getElementById('mental-dot');
  const el    = document.getElementById('mental-scene');

  el.textContent = scene + ' by brain signal';
  card.style.display = '';
  dot.classList.add('active');
  card.classList.add('flash');

  clearTimeout(_mentalFlashTimer);
  _mentalFlashTimer = setTimeout(() => {
    card.style.display = 'none';
    dot.classList.remove('active');
    card.classList.remove('flash');
  }, 2500);
}

socket.on('wink',          () => triggerMental('wink'));
socket.on('jaw_clench',    () => triggerMental('jaw_clench'));
socket.on('eyebrow_raise', () => triggerMental('eyebrow_raise'));

socket.on('muse_status', (d) => {
  clearTimeout(_connectTimeout);
  if (d.status === 'disconnected' || d.status === 'error' || d.status === 'reconnecting') {
    museDisconnecting = false;
  }
  setBciUI(d.status);
});

// ── Waveform ───────────────────────────────────────────────────────────────
class Waveform {
  constructor(id, color) {
    this.canvas   = document.getElementById(id);
    this.ctx      = this.canvas.getContext('2d');
    this.color    = color;
    this.buf      = [];
    this.MAX      = 120;
    this.scaleMax = 1;
    this._dw      = 1;
    this._dh      = 1;
    this._resize();
    window.addEventListener('resize', () => this._resize());
  }
  _resize() {
    const dpr = window.devicePixelRatio || 1;
    this._dw = this.canvas.offsetWidth;
    this._dh = this.canvas.offsetHeight;
    this.canvas.width  = this._dw * dpr;
    this.canvas.height = this._dh * dpr;
    this.ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    this.draw();
  }
  push(v) {
    this.buf.push(v);
    if (this.buf.length > this.MAX) this.buf.shift();
    const curMax = Math.max(...this.buf);
    const target = curMax * 1.15;
    this.scaleMax = target > this.scaleMax ? target : Math.max(target, this.scaleMax * 0.997);
    this.draw();
  }
  draw() {
    const ctx = this.ctx, W = this._dw, H = this._dh;
    ctx.clearRect(0, 0, W, H);
    ctx.fillStyle = '#1e293b';
    ctx.fillRect(0, 0, W, H);
    ctx.strokeStyle = 'rgba(255,255,255,0.06)';
    ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(0, H * 0.5); ctx.lineTo(W, H * 0.5); ctx.stroke();
    if (this.buf.length < 2) return;
    const scale = Math.max(this.scaleMax, 0.001);
    const dx  = W / (this.MAX - 1);
    const off = this.MAX - this.buf.length;
    const xOf = i => (off + i) * dx;
    const yOf = v => H * 0.93 - (v / scale) * H * 0.86;
    const grad = ctx.createLinearGradient(0, 0, 0, H);
    grad.addColorStop(0, this.color + '55');
    grad.addColorStop(1, this.color + '08');
    ctx.beginPath();
    ctx.moveTo(xOf(0), H);
    this.buf.forEach((v, i) => ctx.lineTo(xOf(i), yOf(v)));
    ctx.lineTo(xOf(this.buf.length - 1), H);
    ctx.closePath();
    ctx.fillStyle = grad;
    ctx.fill();
    ctx.beginPath();
    this.buf.forEach((v, i) => {
      i === 0 ? ctx.moveTo(xOf(0), yOf(v)) : ctx.lineTo(xOf(i), yOf(v));
    });
    ctx.strokeStyle = this.color;
    ctx.lineWidth   = 1.5;
    ctx.lineJoin    = 'round';
    ctx.stroke();
  }
}

const waves = {};
document.addEventListener('DOMContentLoaded', () => {
  waves.theta = new Waveform('theta-wave', '#34d399');
  waves.alpha = new Waveform('alpha-wave', '#60a5fa');
  waves.beta  = new Waveform('beta-wave',  '#a78bfa');
});
</script>
