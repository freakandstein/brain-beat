<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BrainBeat</title>
<style>
:root {
    --bg:     #0f0f1a;
    --panel:  #1a1a2e;
    --card:   #16213e;
    --border: #2a2a4a;
    --text:   #e2e8f0;
    --dim:    #64748b;
    --accent: #1e293b;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    min-height: 100vh;
    display: flex;
    justify-content: center;
    padding: 24px 16px 40px;
}

.container {
    width: 100%;
    max-width: 580px;
}

/* ── Header ─────────────────────────────────────────── */
.header { padding: 8px 0 14px; }
.header h1 {
    font-size: 1.45rem;
    font-weight: 800;
    letter-spacing: 0.1em;
    color: var(--text);
}
.header-sub {
    display: flex;
    align-items: center;
    gap: 6px;
    margin-top: 4px;
    color: var(--dim);
    font-size: 0.78rem;
}
.live-dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: #4b5563;
    animation: none;
    flex-shrink: 0;
    transition: background 0.4s;
}
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.25} }

/* ── Divider ─────────────────────────────────────────── */
.divider { height: 1px; background: var(--border); margin: 10px 0; }

/* ── State card ─────────────────────────────────────── */
.state-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 20px 22px;
    margin: 10px 0 14px;
    display: flex;
    gap: 16px;
    align-items: flex-start;
}
.state-card-left { flex: 1; min-width: 0; }
.state-card-right {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    flex-shrink: 0;
}
.state-card-right .sq-label {
    font-family: 'Courier New', monospace;
    font-size: 0.6rem;
    letter-spacing: 0.12em;
    color: var(--dim);
}

.state-row {
    display: flex;
    align-items: baseline;
    gap: 14px;
    margin-bottom: 14px;
}
#state-badge {
    font-family: 'Courier New', Courier, monospace;
    font-size: 2.2rem;
    font-weight: 900;
    letter-spacing: 0.2em;
    color: #4ade80;
    transition: color 0.5s, text-shadow 0.5s;
    text-shadow: 0 0 24px #4ade8080;
}
#state-desc {
    color: var(--dim);
    font-size: 0.82rem;
}

.metrics-row {
    display: flex;
    gap: 28px;
    margin-bottom: 12px;
}
.metric-label {
    font-family: 'Courier New', monospace;
    font-size: 0.65rem;
    letter-spacing: 0.12em;
    color: var(--dim);
    display: block;
    margin-bottom: 2px;
}
.metric-value {
    font-family: 'Courier New', Courier, monospace;
    font-size: 1.4rem;
    font-weight: 700;
    color: var(--text);
}

/* ── Bar / Meter ─────────────────────────────────────── */
.bar-row {
    display: flex;
    align-items: center;
    gap: 10px;
}
.bar-label {
    font-family: 'Courier New', monospace;
    font-size: 0.65rem;
    letter-spacing: 0.1em;
    color: var(--dim);
    width: 38px;
    flex-shrink: 0;
}
.bar-track {
    flex: 1;
    height: 6px;
    background: #1e293b;
    border-radius: 3px;
    overflow: hidden;
}
.bar-fill {
    height: 100%;
    border-radius: 3px;
    transition: width 0.12s linear;
    width: 0%;
}
.bar-fill.build        { background: linear-gradient(90deg, #f59e0b, #ef4444); }
.bar-fill.stress-build { background: linear-gradient(90deg, #ef4444, #7f1d1d); }
.bar-fill.alpha  { background: linear-gradient(90deg, #1d4ed8, #60a5fa); }
.bar-fill.beta   { background: linear-gradient(90deg, #6d28d9, #a78bfa); }
.bar-fill.theta  { background: linear-gradient(90deg, #065f46, #34d399); }

.bar-val {
    font-family: 'Courier New', monospace;
    font-size: 0.78rem;
    color: var(--dim);
    width: 36px;
    text-align: right;
    flex-shrink: 0;
}

/* ── EEG Channels ───────────────────────────────────── */
.section-title {
    font-family: 'Courier New', monospace;
    font-size: 0.65rem;
    letter-spacing: 0.15em;
    color: var(--dim);
    margin-bottom: 10px;
}

.channel { margin-bottom: 16px; }
.channel-name {
    font-family: 'Courier New', Courier, monospace;
    font-size: 0.88rem;
    font-weight: 700;
    margin-bottom: 6px;
    display: block;
}
.channel-name.delta { color: #fb923c; }
.channel-name.alpha { color: #60a5fa; }
.channel-name.beta  { color: #a78bfa; }
.channel-name.theta { color: #34d399; }
.hz-label { font-size: 0.6rem; font-weight: 400; opacity: 0.55; margin-left: 5px; }

.channel .bar-track { height: 8px; }

/* ── Waveform ────────────────────────────────────────── */
.channel-header {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    margin-bottom: 6px;
}
.waveform-canvas {
    width: 100%;
    height: 55px;
    display: block;
    border-radius: 6px;
}

/* ── Footer ──────────────────────────────────────────── */
.footer {
    margin-top: 20px;
    padding: 10px 14px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 8px;
    font-size: 0.75rem;
    color: var(--dim);
    line-height: 1.6;
}
.footer code {
    background: var(--accent);
    padding: 1px 5px;
    border-radius: 3px;
    font-family: 'Courier New', monospace;
    font-size: 0.72rem;
    color: #a78bfa;
}


/* ── Muse 2 panel ────────────────────────────────────── */
.muse-panel {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 14px 18px;
    margin: 8px 0;
}
.muse-status-row {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 10px;
    font-size: 0.82rem;
}
.muse-dot {
    width: 9px; height: 9px;
    border-radius: 50%;
    background: var(--dim);
    flex-shrink: 0;
    transition: background 0.3s;
}
.muse-dot.connected  { background: #4ade80; }
.muse-dot.connecting { background: #fbbf24; animation: blink 0.9s infinite; }
.muse-dot.error      { background: #f87171; }
.muse-input-row {
    display: flex;
    gap: 8px;
    margin-bottom: 8px;
}
#muse-btn, #muse-scan-btn {
    border-radius: 7px;
    font-size: 0.8rem;
    font-weight: 700;
    padding: 8px 16px;
    cursor: pointer;
    white-space: nowrap;
    transition: all 0.15s;
    font-family: inherit;
    border: 1px solid;
}
#muse-btn {
    background: #1a2e20;
    border-color: #4ade80;
    color: #4ade80;
    flex: 1;
}
#muse-btn:hover { background: #243a2a; }
#muse-btn.disconnecting {
    border-color: #f87171;
    color: #f87171;
    background: #2e1a1a;
}
#muse-scan-btn {
    background: var(--accent);
    border-color: var(--border);
    color: var(--dim);
}
#muse-scan-btn:hover { border-color: var(--text); color: var(--text); }
#muse-scan-btn:disabled { opacity: 0.4; cursor: default; }
.muse-device-list {
    display: flex;
    flex-direction: column;
    gap: 6px;
    margin-top: 8px;
}
.muse-device-item {
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: var(--accent);
    border: 1px solid var(--border);
    border-radius: 7px;
    padding: 7px 12px;
    font-size: 0.8rem;
    cursor: pointer;
    transition: border-color 0.15s;
}
.muse-device-item:hover { border-color: #4ade80; }
.muse-device-name { color: var(--text); font-weight: 600; }
.muse-device-addr { color: var(--dim); font-family: monospace; font-size: 0.72rem; }
.muse-hint {
    font-size: 0.72rem;
    color: var(--dim);
    line-height: 1.55;
}

/* ── EEG Head Diagram ───────────────────────────────── */
.head-diagram-wrap {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
    padding: 8px 0 4px;
}
.head-diagram-wrap svg { overflow: visible; }
.head-legend {
    display: flex;
    gap: 14px;
    font-size: 0.68rem;
    color: var(--dim);
    justify-content: center;
}
.head-legend span { display: flex; align-items: center; gap: 4px; }
.head-legend i {
    display: inline-block;
    width: 9px; height: 9px;
    border-radius: 50%;
}
</style>
</head>

<body>
<div class="container">

  <!-- Header -->
  <div class="header">
    <h1>BRAIN BEAT MONITOR</h1>
    <div class="header-sub">
      <span class="live-dot" id="live-dot"></span>
      FluidSynth &nbsp;·&nbsp; Generative &nbsp;·&nbsp; Realtime
    </div>
  </div>

  <div class="divider"></div>

  <!-- State Card -->
  <div class="state-card">
    <div class="state-card-left">
      <div class="state-row">
        <div id="state-badge">CALM</div>
        <div id="state-desc">Calm / Relaxed</div>
      </div>

      <div class="metrics-row">
        <div>
          <span class="metric-label">BPM</span>
          <span class="metric-value" id="bpm-val">72.0</span>
        </div>
        <div>
          <span class="metric-label">HR</span>
          <span class="metric-value" id="hr-val" style="color:#fb7185">—</span>
        </div>
      </div>

      <div class="bar-row">
        <span class="bar-label">TENSE</span>
        <div class="bar-track">
          <div class="bar-fill build" id="build-bar"></div>
        </div>
        <span class="bar-val" id="build-pct">0%</span>
      </div>
      <div class="bar-row" id="stress-build-row" style="display:none">
        <span class="bar-label" style="color:#ef4444">TENSION</span>
        <div class="bar-track">
          <div class="bar-fill stress-build" id="stress-build-bar"></div>
        </div>
        <span class="bar-val" id="stress-build-pct">0%</span>
      </div>
      <div class="bar-row">
        <span class="bar-label" id="conf-label" style="color:#94a3b8">SIGNAL</span>
        <div class="bar-track">
          <div class="bar-fill" id="conf-bar" style="background:#94a3b8;width:0%"></div>
        </div>
        <span class="bar-val" id="conf-pct">0%</span>
      </div>
      <div class="bar-row">
        <span class="bar-label" id="cons-label" style="color:#94a3b8">CONS</span>
        <div class="bar-track">
          <div class="bar-fill" id="cons-bar" style="background:#94a3b8;width:0%"></div>
        </div>
        <span class="bar-val" id="cons-pct">0%</span>
      </div>
    </div>

    <div class="state-card-right">
      <span class="sq-label">EEG CHANNEL MAP</span>
      <svg viewBox="0 0 200 210" width="130" height="137">
        <circle cx="100" cy="112" r="82" fill="none" stroke="#2a2a4a" stroke-width="1.5"/>
        <path d="M93,31 L100,22 L107,31" fill="none" stroke="#2a2a4a" stroke-width="1.5" stroke-linejoin="round"/>
        <path d="M18,112 Q10,112 10,106 Q10,100 18,100" fill="none" stroke="#2a2a4a" stroke-width="1.2"/>
        <path d="M182,112 Q190,112 190,106 Q190,100 182,100" fill="none" stroke="#2a2a4a" stroke-width="1.2"/>
        <circle id="eq-AF7" cx="64" cy="56" r="10" fill="#3f3f46" stroke="#1a1a2e" stroke-width="1.5"/>
        <text x="64" y="60" text-anchor="middle" font-size="7.5" fill="#94a3b8" font-family="monospace">AF7</text>
        <circle id="eq-AF8" cx="136" cy="56" r="10" fill="#3f3f46" stroke="#1a1a2e" stroke-width="1.5"/>
        <text x="136" y="60" text-anchor="middle" font-size="7.5" fill="#94a3b8" font-family="monospace">AF8</text>
        <circle id="eq-TP9" cx="21" cy="112" r="10" fill="#3f3f46" stroke="#1a1a2e" stroke-width="1.5"/>
        <text x="21" y="116" text-anchor="middle" font-size="7.5" fill="#94a3b8" font-family="monospace">TP9</text>
        <circle id="eq-TP10" cx="179" cy="112" r="10" fill="#3f3f46" stroke="#1a1a2e" stroke-width="1.5"/>
        <text x="179" y="116" text-anchor="middle" font-size="7.5" fill="#94a3b8" font-family="monospace">TP10</text>
      </svg>
      <div class="head-legend">
        <span><i style="background:#4ade80"></i>Good</span>
        <span><i style="background:#fbbf24"></i>Weak</span>
        <span><i style="background:#f87171"></i>Poor</span>
        <span><i style="background:#3f3f46"></i>Off</span>
      </div>
    </div>
  </div>

  <!-- EEG Channels -->
  <div class="section-title">EEG CHANNELS</div>

  <!-- Theta -->
  <div class="channel">
    <div class="channel-header">
      <span class="channel-name theta">θ &nbsp;theta<span class="hz-label">4–8 Hz</span></span>
      <span id="theta-val" style="font-family:monospace;font-size:0.78rem;color:#34d399">—</span>
    </div>
    <canvas id="theta-wave" class="waveform-canvas"></canvas>
  </div>

  <!-- Alpha -->
  <div class="channel">
    <div class="channel-header">
      <span class="channel-name alpha">α &nbsp;alpha<span class="hz-label">8–13 Hz</span></span>
      <span id="alpha-val" style="font-family:monospace;font-size:0.78rem;color:#60a5fa">—</span>
    </div>
    <canvas id="alpha-wave" class="waveform-canvas"></canvas>
  </div>

  <!-- Beta -->
  <div class="channel">
    <div class="channel-header">
      <span class="channel-name beta">β &nbsp;beta<span class="hz-label">13–25 Hz</span></span>
      <span id="beta-val" style="font-family:monospace;font-size:0.78rem;color:#a78bfa">—</span>
    </div>
    <canvas id="beta-wave" class="waveform-canvas"></canvas>
  </div>

  <div class="divider"></div>

  <!-- Muse 2 Connection -->
  <div class="section-title">BCI Device</div>
  <div class="muse-panel">
    <div class="muse-status-row">
      <span class="muse-dot" id="muse-dot"></span>
      <span id="muse-status-text" style="color:var(--dim)">Not connected</span>
    </div>
    <div class="muse-input-row">
      <button id="muse-btn" onclick="toggleMuse()" class="disconnecting" style="display:none">Disconnect</button>
      <button id="muse-scan-btn" onclick="scanMuse()">&#x1F50D; Scan Devices</button>
    </div>
    <div class="muse-device-list" id="muse-device-list"></div>
  </div>



</div><!-- /container -->

<script src="/static/socket.io.min.js"></script>
<script>
const STATE_COLORS = {
  calm:  '#4ade80',
  tense: '#c084fc',
};
const STATE_DESC = {
  calm:  'Calm / Relaxed',
  tense: 'Tense / Aroused',
};

// ── Socket.IO ──────────────────────────────────────────────────────────────
const socket = io();

socket.on('connect', () => {
  const dot = document.getElementById('live-dot');
  dot.style.background = '#4ade80';
  dot.style.animation  = 'blink 1.8s ease-in-out infinite';
});

socket.on('disconnect', () => {
  const dot = document.getElementById('live-dot');
  dot.style.background = '#f87171';
  dot.style.animation  = 'none';
});

socket.on('state_update', (d) => {
  // State badge
  const color = STATE_COLORS[d.state] || '#e2e8f0';
  const badge = document.getElementById('state-badge');
  badge.textContent = d.state.toUpperCase();
  badge.style.color = color;
  badge.style.textShadow = `0 0 24px ${color}80`;
  document.getElementById('state-desc').textContent = STATE_DESC[d.state] || '';

  // Metrics
  document.getElementById('bpm-val').textContent = d.bpm.toFixed(1);
  document.getElementById('hr-val').textContent  = d.heart_rate ? d.heart_rate + ' bpm' : '—';
  const tl = d.tense_level || 0;
  document.getElementById('build-bar').style.width = (tl * 100) + '%';
  document.getElementById('build-pct').textContent = Math.round(tl * 100) + '%';
  document.getElementById('stress-build-row').style.display = 'none';

  // Arousal index (raw, signed) — shown as SIGNAL bar label
  const ar = d.arousal || 0;
  // (hidden from metrics row, used only for conf-label coloring)

  // Confidence bar — sembunyikan saat device tidak connected
  const museOk = (d.muse === 'connected');
  const cf = museOk ? (d.confidence || 0) : 0;
  const cfColor = cf > 0.66 ? '#4ade80' : cf > 0.33 ? '#fbbf24' : '#f87171';
  document.getElementById('conf-bar').style.width  = (cf * 100) + '%';
  document.getElementById('conf-bar').style.background = cfColor;
  document.getElementById('conf-pct').textContent  = museOk ? Math.round(cf * 100) + '%' : '—';
  document.getElementById('conf-label').style.color = museOk ? cfColor : '#94a3b8';

  // Consistency bar
  const cs = museOk ? (d.consistency || 0) : 0;
  const csColor = cs > 0.75 ? '#4ade80' : cs > 0.56 ? '#fbbf24' : '#f87171';
  document.getElementById('cons-bar').style.width  = (cs * 100) + '%';
  document.getElementById('cons-bar').style.background = csColor;
  document.getElementById('cons-pct').textContent  = museOk ? Math.round(cs * 100) + '%' : '—';
  document.getElementById('cons-label').style.color = museOk ? csColor : '#94a3b8';

  // EEG waveforms + dominant Hz display
  function toDb(v) { return 10 * Math.log10(Math.max(v, 1e-10)); }
  function fmtHz(hz) { return (hz != null) ? hz.toFixed(1) + ' Hz' : '—'; }
  if (d.theta_raw != null) { waves.theta.push(Math.max(toDb(d.theta_raw), 0)); document.getElementById('theta-val').textContent = fmtHz(d.theta_hz); }
  if (d.alpha_raw != null) { waves.alpha.push(Math.max(toDb(d.alpha_raw), 0)); document.getElementById('alpha-val').textContent = fmtHz(d.alpha_hz); }
  if (d.beta_raw  != null) { waves.beta.push(Math.max(toDb(d.beta_raw),  0)); document.getElementById('beta-val').textContent  = fmtHz(d.beta_hz);  }

  // Sync muse dot jika halaman di-refresh saat sudah terhubung
  if (d.muse === 'connected' && !museConnected && !museDisconnecting) {
    setMuseUI('connected', '✅ Muse 2 connected');
  }

  // EEG channel quality diagram
  updateHeadDiagram(d.channel_quality, d.muse === 'connected');
});

// ── EEG Head Diagram ──────────────────────────────────────────────────────
function updateHeadDiagram(quality, connected) {
  const channels = ['AF7', 'AF8', 'TP9', 'TP10'];
  channels.forEach(name => {
    const el = document.getElementById('eq-' + name);
    if (!el) return;
    if (!connected || quality === null) {
      el.setAttribute('fill', '#3f3f46');
      return;
    }
    const q = quality[name] ?? 0;
    let color;
    if (q >= 0.7)      color = '#4ade80';  // baik
    else if (q >= 0.35) color = '#fbbf24';  // lemah
    else                color = '#f87171';  // buruk
    el.setAttribute('fill', color);
  });
}

// ── Muse 2 ────────────────────────────────────────────────────────────────
let museConnected     = false;
let museDisconnecting = false;

function toggleMuse() {
  // Only called when connected (Disconnect button)
  if (!museConnected) return;
  museDisconnecting = true;
  socket.emit('muse_disconnect');
  setMuseUI('disconnected', 'Not connected');
}

function scanMuse() {
  const scanBtn = document.getElementById('muse-scan-btn');
  scanBtn.disabled = true;
  scanBtn.textContent = 'Scanning...';
  document.getElementById('muse-device-list').innerHTML =
    '<div style="font-size:0.75rem;color:var(--dim);padding:4px 2px">Scanning for BLE devices... (~5 sec)</div>';
  socket.emit('muse_scan');
}

let _connectTimeout = null;

function connectDevice(name, address) {
  socket.emit('muse_connect', { address: address });
  setMuseUI('connecting', 'Connecting to ' + name + '...');
  document.getElementById('muse-device-list').innerHTML = '';
  // Safety timeout: if no status update in 45 s, reset UI so user can retry
  clearTimeout(_connectTimeout);
  _connectTimeout = setTimeout(() => {
    if (!museConnected) {
      setMuseUI('error', '❌ Connection timeout — retry?');
    }
  }, 45000);
}

function setMuseUI(status, text) {
  document.getElementById('muse-dot').className = 'muse-dot ' + status;
  document.getElementById('muse-status-text').textContent = text;
  museConnected = (status === 'connected');

  const connectBtn = document.getElementById('muse-btn');
  const scanBtn    = document.getElementById('muse-scan-btn');

  if (status === 'connected') {
    connectBtn.style.display = '';
    scanBtn.style.display    = 'none';
  } else if (status === 'connecting') {
    connectBtn.style.display = 'none';
    scanBtn.style.display    = '';
    scanBtn.disabled         = true;
    scanBtn.textContent      = '⏳ Connecting...';
  } else {
    // disconnected / error / unavailable
    connectBtn.style.display = 'none';
    scanBtn.style.display    = '';
    scanBtn.disabled         = false;
    scanBtn.textContent      = '\uD83D\uDD0D Scan Devices';
    if (status === 'disconnected') {
      document.getElementById('muse-device-list').innerHTML = '';
    }
  }

}

socket.on('muse_scan_result', (d) => {
  const scanBtn = document.getElementById('muse-scan-btn');
  const list    = document.getElementById('muse-device-list');

  if (d.scanning) return;  // intermediate "searching" state

  scanBtn.disabled = false;
  scanBtn.textContent = '\uD83D\uDD0D Scan';

  if (d.error) {
    list.innerHTML = `<div style="font-size:0.75rem;color:#f87171;padding:4px 2px">${d.error}</div>`;
    return;
  }
  if (!d.devices || d.devices.length === 0) {
    list.innerHTML = '<div style="font-size:0.75rem;color:var(--dim);padding:4px 2px">No Muse devices found. Make sure Muse is powered on.</div>';
    return;
  }
  list.innerHTML = d.devices.map(dev =>
    `<div class="muse-device-item" onclick="connectDevice('${dev.name}','${dev.address}')">
       <span class="muse-device-name">${dev.name}</span>
       <span class="muse-device-addr">${dev.address}</span>
     </div>`
  ).join('');
});

socket.on('muse_status', (d) => {
  clearTimeout(_connectTimeout);
  if (d.status === 'disconnected' || d.status === 'error') {
    museDisconnecting = false;
  }
  const msgs = {
    connected:    '✅ Muse 2 connected',
    connecting:   'Connecting...',
    disconnected: 'Not connected',
    error:        '❌ ' + (d.error || 'Connection failed'),
    unavailable:  'brainflow not installed',
  };
  setMuseUI(d.status, msgs[d.status] || d.status);
});

// ── Waveform ───────────────────────────────────────────────────────────────
class Waveform {
  constructor(id, color) {
    this.canvas   = document.getElementById(id);
    this.ctx      = this.canvas.getContext('2d');
    this.color    = color;
    this.buf      = [];
    this.MAX      = 120;  // 2 min at 1 Hz
    this.scaleMax = 1; // dB scale — auto-expands on first data
    this._dw      = 1;
    this._dh      = 1;
    this._resize();
    window.addEventListener('resize', () => this._resize());
  }
  _resize() {
    const dpr = window.devicePixelRatio || 1;
    this._dw = this.canvas.offsetWidth;
    this._dh = this.canvas.offsetHeight;
    this.canvas.width  = this._dw * dpr;
    this.canvas.height = this._dh * dpr;
    this.ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    this.draw();
  }
  push(v) {
    this.buf.push(v);
    if (this.buf.length > this.MAX) this.buf.shift();
    const curMax = Math.max(...this.buf);
    const target = curMax * 1.15;
    this.scaleMax = target > this.scaleMax ? target : Math.max(target, this.scaleMax * 0.997);
    this.draw();
  }
  draw() {
    const ctx = this.ctx, W = this._dw, H = this._dh;
    ctx.clearRect(0, 0, W, H);
    // background
    ctx.fillStyle = '#1e293b';
    ctx.fillRect(0, 0, W, H);
    // center gridline at 0.5
    ctx.strokeStyle = 'rgba(255,255,255,0.06)';
    ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(0, H * 0.5); ctx.lineTo(W, H * 0.5); ctx.stroke();
    if (this.buf.length < 2) return;
    const scale = Math.max(this.scaleMax, 0.001);
    const dx  = W / (this.MAX - 1);
    const off = this.MAX - this.buf.length;
    const xOf = i => (off + i) * dx;
    const yOf = v => H * 0.93 - (v / scale) * H * 0.86;
    // fill area
    const grad = ctx.createLinearGradient(0, 0, 0, H);
    grad.addColorStop(0, this.color + '55');
    grad.addColorStop(1, this.color + '08');
    ctx.beginPath();
    ctx.moveTo(xOf(0), H);
    this.buf.forEach((v, i) => ctx.lineTo(xOf(i), yOf(v)));
    ctx.lineTo(xOf(this.buf.length - 1), H);
    ctx.closePath();
    ctx.fillStyle = grad;
    ctx.fill();
    // stroke line
    ctx.beginPath();
    this.buf.forEach((v, i) => {
      i === 0 ? ctx.moveTo(xOf(0), yOf(v)) : ctx.lineTo(xOf(i), yOf(v));
    });
    ctx.strokeStyle = this.color;
    ctx.lineWidth   = 1.5;
    ctx.lineJoin    = 'round';
    ctx.stroke();
  }
}

const waves = {};
document.addEventListener('DOMContentLoaded', () => {
  waves.theta = new Waveform('theta-wave', '#34d399');
  waves.alpha = new Waveform('alpha-wave', '#60a5fa');
  waves.beta  = new Waveform('beta-wave',  '#a78bfa');
});
